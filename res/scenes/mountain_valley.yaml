version: 1

scene:
  id: test_mountain_valley
  name: "Mountain Valley Test"

  world:
    region_size_chunks: 24
    base_cell_size: 1.0
    chunk_cells: 24
    lod_count: 3

  height:
    min: -8.0
    max: 18.0
    base: 5.0

  noise:
    seed: 1337
    legacy:
      frequency: 0.085
      amplitude: 13.0
      octaves: 4
      lacunarity: 2.05
      gain: 0.48
    octaves:
      - name: macro
        kind: fbm
        frequency: 0.032
        amplitude: 16.0
      - name: forms
        kind: fbm
        frequency: 0.085
        amplitude: 8.0
      - name: detail
        kind: fbm
        frequency: 0.14
        amplitude: 3.0
      - name: ridges
        kind: ridged
        frequency: 0.075
